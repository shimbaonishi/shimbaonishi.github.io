<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    
    <!-- Connect to Google Fonts to fetch Unbounded and Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            /* Sets fallback typography layout across entire document */
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            margin: 0;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        h1 {
            /* Applies 'Unbounded' typography rules exclusively to main headline */
            font-family: 'Unbounded', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            margin: 0 0 35px 0;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }
        .links-container {
            width: 100%;
        }
        .link-btn {
            display: block;
            /* Frosted glass background using transparency logic */
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 18px;
            margin-bottom: 18px;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            
            /* The essential blur engine properties for frosted aesthetic */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            /* Glass border accentuation */
            border: 1px solid rgba(255, 255, 255, 0.18);
            
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .link-btn:hover {
            /* Interaction behavior highlighting transparency alterations */
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.35);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content">
        <img src="profile.jpg" alt="Profile Picture" class="profile-img">
        <h1>Connect With Me!</h1>

        <div class="links-container">
            <a href="https://shimbaonishi.xyz/" target="_blank" class="link-btn">Portfolio</a>
            <a href="https://www.instagram.com/shimb_e/" target="_blank" class="link-btn">Instagram</a>
            <a href="https://www.flickr.com/people/204539302@N06/" target="_blank" class="link-btn">Flickr</a>
            <a href="https://www.linkedin.com/in/shimba-onishi-007982250/" target="_blank" class="link-btn">LinkedIn</a>
        </div>
    </div>

</body>
</html>
